services:
  db:
    image: postgres:16
    container_name: gadgetstore_db
    environment:
      POSTGRES_DB: gadgetstore
      POSTGRES_USER: gadget_admin
      POSTGRES_PASSWORD: Admin12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  web:
    build: .
    container_name: gadgetstore_web
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  postgres_data:
